name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate meson.build version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(sed -nE "s/^project\('([^']+)', 'vala', 'c', version: '([^']+)'\).*$/\2/p" meson.build)"

          if [ -z "${FILE_VERSION}" ]; then
            echo "::error::Unable to read project version from meson.build"
            exit 1
          fi

          if [ "${FILE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::meson.build version (${FILE_VERSION}) does not match tag (${TAG_VERSION})."
            echo "Update meson.build, commit, and create/push the tag again."
            exit 1
          fi

          echo "meson.build version matches tag: ${TAG_VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            pkg-config \
            libglib2.0-dev \
            libgee-0.8-dev

      - name: Configure release build
        run: meson setup build-release --buildtype=release

      - name: Build release
        run: meson compile -C build-release

      - name: Run tests
        run: meson test -C build-release --print-errorlogs

      - name: Create release bundle
        run: |
          PROJECT_SLUG="${GITHUB_REPOSITORY##*/}"
          mkdir -p dist
          cp -a build-release/src/lib*.so* dist/ || true
          cp -a build-release/src/vapi/*.vapi dist/ || true
          cp -a build-release/src/*.h dist/ || true
          (cd dist && zip -r ../${PROJECT_SLUG}-${GITHUB_REF_NAME}-linux.zip .)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: warn
          path: |
            build-release/src/lib*.so*
            build-release/src/vapi/*.vapi
            build-release/src/*.h
            *-${{ github.ref_name }}-linux.zip

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"

          {
            echo
            echo "## Changes"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${CURRENT_TAG}" || true
            else
              echo "Initial release changes:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${CURRENT_TAG}" || true
            fi
            echo
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build-release/src/lib*.so*
            build-release/src/vapi/*.vapi
            build-release/src/*.h
            *-${{ github.ref_name }}-linux.zip
